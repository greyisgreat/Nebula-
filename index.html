<script>

// ONLY CHANGE IS HERE ↓↓↓
function navigate(){
  const bar=document.getElementById('url-bar');
  let url=bar.value.trim();
  if(!url) return;

  if(!url.startsWith('http')) url='https://'+url;
  bar.value=url;

  // ✅ FIXED PROXY
  const proxyUrl = location.origin + "/service/" + encodeURIComponent(url);

  const frame=document.getElementById('proxy-iframe');
  const overlay=document.getElementById('browser-overlay');

  frame.style.display='block';
  overlay.style.display='none';

  frame.src = proxyUrl;
}

</script>
